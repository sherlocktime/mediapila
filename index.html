<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pila de Fotos</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
    /* ======================================================
       VARIABLES & BASE
    ====================================================== */
    :root {
        --bg: #000000;
        --panel-bg: rgba(20, 20, 20, 0.95);
        --border: rgba(255, 255, 255, 0.2);
        --accent: #ffcc00;
        --text: #ffffff;
        --muted: #aaaaaa;
        --btn-bg: rgba(255, 255, 255, 0.1);
        --btn-hover: rgba(255, 255, 255, 0.2);
        --font-main: system-ui, -apple-system, sans-serif;
        --btn-height: 44px;
        --icon-btn-size: 44px;
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    h1 {
        position: absolute;
        top: 20px;
        left: 20px;
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        z-index: 10;
        pointer-events: none;
        opacity: 0.8;
    }

    #canvas-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        width: 100%;
        height: calc(100vh - 190px); 
        padding: 20px;
        background: #000;
    }

    canvas {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        border: 1px solid var(--border);
    }

    /* ======================================================
       PANEL DE CONTROL (Optimizado para Móvil)
    ====================================================== */
    .control-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid var(--border);
        padding: 16px 16px env(safe-area-inset-bottom, 16px);
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    }

    .controls-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 10px;
        align-items: center;
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    .controls-row.full-width {
        grid-template-columns: 1fr;
    }

    /* ======================================================
       BOTONES RECTANGULARES (Cargar, Guardar, Custom Selects)
    ====================================================== */
    button.rect-btn, .file-upload-label, .custom-select-trigger {
        background: var(--btn-bg);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 0 14px; 
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s ease;
        user-select: none;
        display: inline-flex;
        align-items: center;
        justify-content: flex-start; 
        height: var(--btn-height);
        width: 100%; 
        font-family: var(--font-main);
    }

    button.rect-btn:hover, .file-upload-label:hover, .custom-select-trigger:hover {
        background: var(--btn-hover);
        border-color: rgba(255,255,255,0.4);
    }

    button.rect-btn:active, .file-upload-label:active, .custom-select-trigger:active {
        transform: scale(0.98);
    }

    #downloadBtn {
        background: rgba(255, 204, 0, 0.15);
        border-color: var(--accent);
        color: var(--accent);
    }

    #downloadBtn:hover {
        background: rgba(255, 204, 0, 0.3);
    }

    #files {
        display: none;
    }

    .file-upload-label {
        background: var(--accent);
        color: #000;
        border: none;
    }

    .file-upload-label:hover {
        background: #e6b800;
    }

    /* ======================================================
       BOTONES CUADRADOS (Iconos solos)
    ====================================================== */
    button.icon-btn {
        background: var(--btn-bg);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 0;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s ease;
        user-select: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: var(--icon-btn-size);
        height: var(--icon-btn-size);
        font-size: 18px; 
        line-height: 1;
    }

    button.icon-btn:hover {
        background: var(--btn-hover);
        border-color: rgba(255,255,255,0.4);
    }

    button.icon-btn:active {
        transform: scale(0.95);
    }

    /* ======================================================
       NUEVOS SELECTORES PERSONALIZADOS (Dropdowns pequeños)
    ====================================================== */
    .custom-select-container {
        position: relative;
        width: 100%;
    }

    .custom-select-trigger {
        justify-content: space-between; /* Texto a la izquierda, flecha a la derecha */
    }

    .custom-select-trigger::after {
        content: "▼";
        font-size: 8px;
        color: var(--muted);
        margin-left: 8px;
    }

    .custom-options-list {
        position: absolute;
        bottom: calc(100% + 6px); /* Se abre hacia arriba para no tapar los dedos */
        left: 0;
        right: 0;
        background: rgba(25://25, 25, 0.98);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--border);
        border-radius: 6px;
        max-height: 450px; /* Tamaño controlado de la lista */
        overflow-y: auto;
        display: none;
        z-index: 110;
        box-shadow: 0 -8px 24px rgba(0,0,0,0.6);
    }

    .custom-options-list.show {
        display: block;
    }

    .custom-option {
        padding: 12px 14px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        color: var(--text);
        cursor: pointer;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        text-align: left;
    }

    .custom-option:last-child {
        border-bottom: none;
    }

    .custom-option:hidden {
        display: none;
    }

    .custom-option.selected {
        color: var(--accent);
        background: rgba(255, 255, 255, 0.05);
    }

    .custom-option:active {
        background: var(--btn-hover);
    }

    /* ======================================================
       SLIDER
    ====================================================== */
    .slider-group {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        background: rgba(255,255,255,0.03);
        padding: 6px 12px;
        border-radius: 4px;
        border: 1px solid rgba(255,255,255,0.05);
    }

    input[type="range"] {
        -webkit-appearance: none;
        flex: 1;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background: var(--accent);
        cursor: pointer;
        border-radius: 50%;
        border: 2px solid #fff;
    }

    .status-text {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: center;
        margin-top: 2px;
    }
</style>
</head>
<body>

<h1>📸 Pila de Fotos</h1>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<div class="control-panel">
    <div class="controls-row">
        <label class="file-upload-label">Cargar Imágenes
            <input id="files" type="file" multiple accept="image/*">
        </label>
        
        <button id="randomBtn" class="icon-btn" title="Aleatorio">⟳</button>
        
        <button id="downloadBtn" class="rect-btn">Exportar PNG</button>
    </div>

    <div class="controls-row">
        <div class="custom-select-container">
            <button id="opacityTrigger" class="custom-select-trigger">Fija</button>
            <div id="opacityOptions" class="custom-options-list">
                <div class="custom-option selected" data-value="fixed">Fija</div>
                <div class="custom-option" data-value="linear">Progresiva</div>
                <div class="custom-option" data-value="average">Promedio</div>
            </div>
        </div>
        
        <button id="reverseBtn" class="icon-btn" title="Invertir orden">⇅</button>
        
        <div class="custom-select-container">
            <button id="blendTrigger" class="custom-select-trigger">Normal</button>
            <div id="blendOptions" class="custom-options-list">
                <div class="custom-option selected" data-value="source-over">Normal</div>
                <div class="custom-option" data-value="multiply">Oscurecer</div>
                <div class="custom-option" data-value="screen">Aclarar</div>
                <div class="custom-option" data-value="overlay">Contraste</div>
                <div class="custom-option" data-value="lighten">Más claro</div>
                <div class="custom-option" data-value="darken">Más oscuro</div>
                <div class="custom-option" data-value="difference">Diferencia</div>
                <div class="custom-option" data-value="soft-light">Luz suave</div>
                <div class="custom-option" data-value="hard-light">Luz fuerte</div>
            </div>
        </div>
    </div>

    <div class="controls-row full-width">
        <div class="slider-group">
            <span id="alphaValue" style="font-size: 10px; width: 35px; font-weight: bold;">30%</span>
            <input type="range" id="alpha" min="1" max="100" value="30">
        </div>
    </div>

    <div id="status" class="status-text">Sin imágenes cargadas</div>
</div>

<script>
    const $ = id => document.getElementById(id);
    const filesInput = $("files");
    const alpha = $("alpha");
    const alphaValue = $("alphaValue");
    const reverseBtn = $("reverseBtn");
    const randomBtn = $("randomBtn");
    const downloadBtn = $("downloadBtn");
    const status = $("status");
    const canvas = $("canvas");
    const ctx = canvas.getContext("2d");
    
    // Selectores customizados globales
    const opacityTrigger = $("opacityTrigger");
    const opacityOptions = $("opacityOptions");
    const blendTrigger = $("blendTrigger");
    const blendOptions = $("blendOptions");

    // Valores seleccionados actuales
    let currentOpacityMode = "fixed";
    let currentBlendMode = "source-over";

    let files = [];
    const blendModes = ["source-over", "multiply", "screen", "overlay", "lighten", "darken", "difference", "soft-light", "hard-light"];
    const opacityModes = ["fixed", "linear", "average"];
    const randomItem = arr => arr[Math.floor(Math.random() * arr.length)];

    // Lógica para abrir/cerrar menús customizados
    function setupCustomSelect(trigger, optionsContainer, onChangeCallback) {
        trigger.addEventListener("click", (e) => {
            e.stopPropagation();
            // Cerrar el otro menú antes de abrir este
            if(trigger.id === "opacityTrigger") blendOptions.classList.remove("show");
            else opacityOptions.classList.remove("show");
            
            optionsContainer.classList.toggle("show");
        });

        optionsContainer.querySelectorAll(".custom-option").forEach(option => {
            option.addEventListener("click", () => {
                optionsContainer.querySelectorAll(".custom-option").forEach(opt => opt.classList.remove("selected"));
                option.classList.add("selected");
                trigger.textContent = option.textContent;
                optionsContainer.classList.remove("show");
                onChangeCallback(option.dataset.value);
            });
        });
    }

    // Inicializar menús customizados
    setupCustomSelect(opacityTrigger, opacityOptions, (val) => {
        currentOpacityMode = val;
        updateUI();
        render();
    });

    setupCustomSelect(blendTrigger, blendOptions, (val) => {
        currentBlendMode = val;
        render();
    });

    // Cerrar menús si se toca fuera
    document.addEventListener("click", () => {
        opacityOptions.classList.remove("show");
        blendOptions.classList.remove("show");
    });

    function updateUI() {
        const isFixed = currentOpacityMode === "fixed";
        alpha.disabled = !isFixed;
        alpha.style.opacity = isFixed ? "1" : "0.3";
        alphaValue.style.opacity = isFixed ? "1" : "0.3";
        alphaValue.textContent = `${alpha.value}%`;

        // Sincronizar los triggers visualmente por si cambia vía botón aleatorio
        const currentOptLabel = opacityOptions.querySelector(`[data-value="${currentOpacityMode}"]`).textContent;
        const currentBlendLabel = blendOptions.querySelector(`[data-value="${currentBlendMode}"]`).textContent;
        opacityTrigger.textContent = currentOptLabel;
        blendTrigger.textContent = currentBlendLabel;
    }

    function updateStatus() {
        if (!files.length) {
            status.textContent = "Sin imágenes cargadas";
            return;
        }
        const blendName = blendOptions.querySelector(`[data-value="${currentBlendMode}"]`).textContent;
        const opacityName = opacityOptions.querySelector(`[data-value="${currentOpacityMode}"]`).textContent;
        status.textContent = `${files.length} imágenes · ${blendName} · ${opacityName}`;
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    async function render() {
        if (!files.length) return;
        status.textContent = "Procesando...";
        try {
            const images = await Promise.all(files.map(loadImage));
            const { width, height } = images[0];
            canvas.width = width;
            canvas.height = height;
            ctx.clearRect(0, 0, width, height);
            
            const baseAlpha = alpha.value / 100;
            const n = images.length;
            
            images.forEach((img, i) => {
                let a = baseAlpha;
                if (currentOpacityMode === "linear") {
                    a = 1 - i / Math.max(1, n - 1);
                } else if (currentOpacityMode === "average") {
                    a = 1 / n;
                }
                ctx.globalAlpha = a;
                ctx.globalCompositeOperation = currentBlendMode;
                ctx.drawImage(img, 0, 0, width, height);
            });
            
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = "source-over";
            updateStatus();
        } catch (e) {
            console.error(e);
            status.textContent = "Error al cargar";
        }
    }

    filesInput.addEventListener("change", () => { files = [...filesInput.files]; render(); });
    alpha.addEventListener("input", () => { updateUI(); });
    alpha.addEventListener("change", render);
    
    reverseBtn.addEventListener("click", () => { if (!files.length) return; files.reverse(); render(); });
        
    randomBtn.addEventListener("click", () => {
        if (!files.length) return;
        
        currentBlendMode = randomItem(blendModes);
        currentOpacityMode = randomItem(opacityModes);
        
        // Actualizar estados internos en la UI customizada
        blendOptions.querySelectorAll(".custom-option").forEach(opt => {
            opt.classList.toggle("selected", opt.dataset.value === currentBlendMode);
        });
        opacityOptions.querySelectorAll(".custom-option").forEach(opt => {
            opt.classList.toggle("selected", opt.dataset.value === currentOpacityMode);
        });

        alpha.value = Math.floor(Math.random() * 100) + 1;
        updateUI();
        shuffle(files);
        render();
    });

    downloadBtn.addEventListener("click", () => {
        if (!canvas.width) return;
        const a = document.createElement("a");
        a.download = "pila-fotos-mezclada.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
    });

    updateUI();
</script>
</body>
</html>
