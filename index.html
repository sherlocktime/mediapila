<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pila de Fotos</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">

    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #000000;
            --panel-bg: rgba(20, 20, 20, 0.75);
            --surface-menu: #1c1c1e;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffcc00;
            --accent-bg: rgba(255, 204, 0, 0.15);
            --text: #ffffff;
            --muted: #8e8e93;
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.15);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px;
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            min-height: 0;

            canvas {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                border-radius: 12px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            }
        }

        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            padding: 16px 16px calc(12px + env(safe-area-inset-bottom, 12px));
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
        }

        .controls-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;

            &.full-width {
                grid-template-columns: 1fr;
            }
        }

        /* Alineación izquierda unificada para mantener un eje de lectura consistente en móviles */
        button, .file-upload-label {
            font-family: inherit;
            color: var(--text);
            background: var(--btn-bg);
            border: 1px solid var(--border);
            height: 46px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 14px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s ease, transform 0.1s ease;

            &:active {
                transform: scale(0.97);
                background: var(--btn-hover);
            }
        }

        .rect-btn,
        .file-upload-label,
        .custom-select-trigger {
            width: 100%;
            padding-left: 14px;
        }

        .custom-select-trigger {
            justify-content: space-between;

            &::after {
                content: "▾";
                color: var(--muted);
                font-size: 12px;
            }
        }

        .file-upload-label {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            border: none;
        }

        /* Acción final principal: Destacada mediante opacidad neutra de alto brillo */
        #downloadBtn {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--border);
            color: var(--text);
            font-weight: 600;
        }

        #downloadBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #files {
            display: none;
        }

        button.icon-btn {
            width: 46px;
            font-size: 16px;
            justify-content: center;
            padding: 0;
        }

        /* Código de color Funcional: Amarillo reservado exclusivamente para herramientas creativas/aleatorias */
        #randomBtn, #reverseBtn {
            color: var(--accent);
            background: var(--accent-bg);
            border-color: rgba(255, 204, 0, 0.2);
        }

        #randomBtn:hover, #reverseBtn:hover {
            background: rgba(255, 204, 0, 0.25);
            border-color: var(--accent);
        }

        #randomBtn:active, #reverseBtn:active {
            transform: scale(0.93);
        }

        .custom-select-container {
            position: relative;
            width: 100%;
        }

        .custom-options-list {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--surface-menu);
            border: 1px solid var(--border);
            border-radius: 13px;
            max-height: 280px;
            overflow-y: auto;
            display: none;
            z-index: 110;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            padding: 4px;

            &.show {
                display: block;
            }
        }

        .custom-option {
            padding: 12px 14px;
            font-size: 14px;
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            transition: background 0.1s;

            &:active {
                background: rgba(255, 255, 255, 0.1);
            }

            &.selected {
                color: var(--accent);
                background: rgba(255, 255, 255, 0.05);
            }
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;

            &::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 24px;
                height: 24px;
                background: #ffffff;
                cursor: pointer;
                border-radius: 50%;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            }
        }

        .status-text {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            padding-top: 2px;
            font-weight: 400;
        }
    </style>
</head>

<body>

    <h1>Pila de Fotos</h1>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="controls-row">
            <label class="file-upload-label">Cargar Fotos
                <input id="files" type="file" multiple accept="image/*">
            </label>

            <button id="randomBtn" class="icon-btn" title="Aleatorio">⚡</button>

            <button id="downloadBtn" class="rect-btn">Descargar</button>
        </div>

        <div class="controls-row">
            <div class="custom-select-container">
                <button id="opacityTrigger" class="custom-select-trigger">Fija</button>
                <div id="opacityOptions" class="custom-options-list">
                    <div class="custom-option selected" data-value="fixed">Fija</div>
                    <div class="custom-option" data-value="linear">Progresiva</div>
                    <div class="custom-option" data-value="average">Promedio</div>
                </div>
            </div>

            <button id="reverseBtn" class="icon-btn" title="Mezclar orden de fotos">🔒</button>

            <div class="custom-select-container">
                <button id="blendTrigger" class="custom-select-trigger">Normal</button>
                <div id="blendOptions" class="custom-options-list">
                    <div class="custom-option selected" data-value="source-over">Normal</div>
                    <div class="custom-option" data-value="multiply">Oscurecer</div>
                    <div class="custom-option" data-value="screen">Aclarar</div>
                    <div class="custom-option" data-value="overlay">Contraste</div>
                    <div class="custom-option" data-value="lighten">Más claro</div>
                    <div class="custom-option" data-value="darken">Más oscuro</div>
                    <div class="custom-option" data-value="difference">Diferencia</div>
                    <div class="custom-option" data-value="soft-light">Luz suave</div>
                    <div class="custom-option" data-value="hard-light">Luz fuerte</div>
                </div>
            </div>
        </div>

        <div class="controls-row full-width">
            <div class="slider-group">
                <span id="alphaValue" style="font-size: 12px; width: 35px; font-weight: 500;">30%</span>
                <input type="range" id="alpha" min="1" max="100" value="30">
            </div>
        </div>

        <div id="status" class="status-text">Sin imágenes cargadas</div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const filesInput = $("files");
        const alpha = $("alpha");
        const alphaValue = $("alphaValue");
        const reverseBtn = $("reverseBtn");
        const randomBtn = $("randomBtn");
        const downloadBtn = $("downloadBtn");
        const status = $("status");
        const canvas = $("canvas");
        const ctx = canvas.getContext("2d");

        const opacityTrigger = $("opacityTrigger");
        const opacityOptions = $("opacityOptions");
        const blendTrigger = $("blendTrigger");
        const blendOptions = $("blendOptions");

        let currentOpacityMode = "fixed";
        let currentBlendMode = "source-over";
        let files = [];

        const blendModes = ["source-over", "multiply", "screen", "overlay", "lighten", "darken", "difference", "soft-light", "hard-light"];
        const opacityModes = ["fixed", "linear", "average"];
        const randomItem = arr => arr[Math.floor(Math.random() * arr.length)];

        function closeAllMenus() {
            opacityOptions.classList.remove("show");
            blendOptions.classList.remove("show");
        }

        /* Controlador central para selectores personalizados nativos */
        function setupCustomSelect(trigger, optionsContainer, onChangeCallback) {
            trigger.addEventListener("click", (e) => {
                e.stopPropagation();
                const isAlreadyOpen = optionsContainer.classList.contains("show");
                closeAllMenus();
                if (!isAlreadyOpen) optionsContainer.classList.add("show");
            });

            optionsContainer.querySelectorAll(".custom-option").forEach(option => {
                option.addEventListener("click", () => {
                    optionsContainer.querySelectorAll(".custom-option").forEach(opt => opt.classList.remove("selected"));
                    option.classList.add("selected");
                    trigger.textContent = option.textContent;
                    optionsContainer.classList.remove("show");
                    onChangeCallback(option.dataset.value);
                });
            });
        }

        setupCustomSelect(opacityTrigger, opacityOptions, (val) => { currentOpacityMode = val; updateUI(); render(); });
        setupCustomSelect(blendTrigger, blendOptions, (val) => { currentBlendMode = val; render(); });
        document.addEventListener("click", closeAllMenus);

        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        /* Algoritmo de barajado Fisher-Yates para reordenar arrays de forma aleatoria uniforme */
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        /* Núcleo de procesamiento del Canvas: Dibuja y mezcla de forma destructiva y asíncrona la pila de imágenes */
        async function render() {
            if (!files.length) return;
            status.textContent = "Procesando...";

            try {
                const images = await Promise.all(files.map(loadImage));

                /* Optimización de Hardware: Evita el colapso de RAM limitando dimensiones críticas en móviles */
                const MAX_DIMENSION = 2500;
                let { width, height } = images[0];

                if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
                    if (width > height) {
                        height *= MAX_DIMENSION / width;
                        width = MAX_DIMENSION;
                    } else {
                        width *= MAX_DIMENSION / height;
                        height = MAX_DIMENSION;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                ctx.clearRect(0, 0, width, height);

                const baseAlpha = alpha.value / 100;
                const n = images.length;

                images.forEach((img, i) => {
                    let a = baseAlpha;
                    if (currentOpacityMode === "linear") {
                        a = 1 - i / Math.max(1, n - 1);
                    } else if (currentOpacityMode === "average") {
                        a = 1 / n;
                    }
                    ctx.globalAlpha = a;
                    ctx.globalCompositeOperation = currentBlendMode;
                    ctx.drawImage(img, 0, 0, width, height);
                });

                /* Reset estructural del contexto para no corromper futuras operaciones de dibujo */
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = "source-over";
                updateStatus();
            } catch (e) {
                console.error(e);
                status.textContent = "Error al procesar imágenes";
            }
        }

        function updateUI() {
            const isFixed = currentOpacityMode === "fixed";
            alpha.disabled = !isFixed;
            alpha.style.opacity = isFixed ? "1" : "0.3";
            alphaValue.style.opacity = isFixed ? "1" : "0.3";
            alphaValue.textContent = `${alpha.value}%`;

            const opacityOpt = opacityOptions.querySelector(`[data-value="${currentOpacityMode}"]`);
            const blendOpt = blendOptions.querySelector(`[data-value="${currentBlendMode}"]`);
            if (opacityOpt) opacityTrigger.textContent = opacityOpt.textContent;
            if (blendOpt) blendTrigger.textContent = blendOpt.textContent;
        }

        function updateStatus() {
            if (!files.length) {
                status.textContent = "Sin imágenes cargadas";
                return;
            }
            const blendName = blendOptions.querySelector(`[data-value="${currentBlendMode}"]`).textContent;
            const opacityName = opacityOptions.querySelector(`[data-value="${currentOpacityMode}"]`).textContent;
            status.textContent = `${files.length} imágenes · ${blendName} · ${opacityName}`;
        }

        filesInput.addEventListener("change", () => {
            if (filesInput.files.length) {
                files = [...filesInput.files];
                render();
            }
        });

        alpha.addEventListener("input", updateUI);
        alpha.addEventListener("change", render);

        /* Herramienta creativa 1 (🔒): Cambia el orden de la pila preservando los parámetros de mezcla manuales */
        reverseBtn.addEventListener("click", () => { 
            if (!files.length) return; 
            shuffle(files);
            render();
        });

        /* Herramienta creativa 2 (⚡): Modificación caótica total de todas las variables del sistema */
        randomBtn.addEventListener("click", () => {
            if (!files.length) return;

            currentBlendMode = randomItem(blendModes);
            currentOpacityMode = randomItem(opacityModes);

            blendOptions.querySelectorAll(".custom-option").forEach(opt => {
                opt.classList.toggle("selected", opt.dataset.value === currentBlendMode);
            });
            opacityOptions.querySelectorAll(".custom-option").forEach(opt => {
                opt.classList.toggle("selected", opt.dataset.value === currentOpacityMode);
            });

            alpha.value = Math.floor(Math.random() * 100) + 1;
            updateUI();
            shuffle(files);
            render();
        });

        /* El timeout asíncrono previene el bloqueo del hilo principal de UI, permitiendo pintar el cambio de texto */
        downloadBtn.addEventListener("click", () => {
            if (!canvas.width) return;
            status.textContent = "Preparando descarga...";

            setTimeout(() => {
                const a = document.createElement("a");
                a.download = `pila-${Date.now()}.png`; 
                a.href = canvas.toDataURL("image/png");
                a.click();
                updateStatus();
            }, 50);
        });

        updateUI();
    </script>
</body>

</html>
